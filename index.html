<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pam | Team Introduction</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f4f8ff, #eef7f5);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #2d3748;
      padding: 24px;
    }

    .card {
      background: white;
      max-width: 700px;
      width: 100%;
      padding: 48px;
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 12px;
    }

    h2 {
      color: #4a5568;
      font-weight: normal;
      margin-bottom: 28px;
    }

    p {
      font-size: 1.15rem;
      line-height: 1.8;
      margin-bottom: 18px;
    }

    .contact {
      margin-top: 30px;
      padding: 18px;
      background: #edf7ff;
      border-radius: 10px;
      font-weight: bold;
      color: #1a4f8b;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, I'm Pam</h1>
    <h2>Accountant</h2>

    <p>
      I help keep financial records organized, accurate, and easy to understand.
    </p>

    <p>
      This page is for my team—a simple place to introduce who I am and the work I do.
    </p>

    <div class="contact">
      Feel free to reach out anytime. I'm always happy to collaborate and help.
    </div>
  </div>
</body>
</html>
